<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#000713">
  <meta id="pageDescription" name="description" content="Discover the official music and artist links.">
  <title>Deep Cuts</title>
  <link rel="preload" href="/assets/aggits-original-cutout-v4.png" as="image">
  <link rel="stylesheet" href="/styles.css?v=20260716-master-1">
</head>
<body>
  <main id="app" class="discovery-shell">
    <section id="discoveryPage" class="discovery-page" aria-labelledby="bandName">
      <header class="hero">
        <div class="hero-stage" aria-hidden="true"></div>
        <img id="heroArtwork" class="hero-artwork" src="/assets/aggits-original-cutout-v4.png" alt="Aggits">
        <div class="artist-title-row"><span></span><h1 id="bandName">Deep Cuts</h1><span></span></div>
        <p id="artistBio" class="artist-bio"></p>
        <div id="sonicSignature" class="sonic-signature" aria-hidden="true"></div>
        <ul class="feature-list" aria-label="Artist destinations">
          <li>Listen</li><li>Watch</li><li>Follow</li><li>Buy Stuff</li>
        </ul>
      </header>

      <section class="link-section" aria-labelledby="discoverTitle">
        <h2 id="discoverTitle" class="visually-hidden">Official artist destinations</h2>
        <div id="platformLinks" class="platform-links"></div>
      </section>

      <section class="share-section" aria-label="Share this artist">
        <button id="shareButton" class="share-button" type="button">Share</button>
        <p id="shareStatus" class="status" aria-live="polite"></p>
      </section>

      <footer class="page-footer">
        <span>Powered by Deep Cuts</span>
        <small id="coverCopyright">copyright Clearlight Creative</small>
      </footer>
    </section>

    <section id="errorScreen" class="error-screen" hidden>
      <h1>Artist page unavailable</h1>
      <p id="errorMessage">Please refresh and try again.</p>
    </section>
  </main>
  <script src="/js/analytics.js?v=20260716-master-1"></script>
  <script src="/js/interactions.js?v=20260716-master-1"></script>
  <script src="/js/app.js?v=20260716-master-1"></script>
</body>
</html>
