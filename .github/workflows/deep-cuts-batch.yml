name: Run Deep Cuts artist batch

on:
  push:
    branches: [main]
    paths:
      - "data/incoming/**.csv"
      - ".github/workflows/deep-cuts-batch.yml"
  workflow_dispatch:
    inputs:
      csv_path:
        description: CSV file stored in the repository
        required: true
        default: data/incoming/artists.csv
      mode:
        description: validate, test, run, resume or retry
        required: true
        type: choice
        options: [validate, test, run, resume, retry]
        default: run

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: deep-cuts-batch
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run deepcuts:batch:test
      - name: Run isolated artist pipeline
        env:
          BATCH_MODE: "${{ inputs.mode || 'run' }}"
          BATCH_CSV: "${{ inputs.csv_path || 'data/incoming/artists.csv' }}"
        run: npm run deepcuts:batch -- "$BATCH_MODE" --input "$BATCH_CSV"
      - name: Preserve reports and accepted editions
        if: (inputs.mode || 'run') != 'validate' && (inputs.mode || 'run') != 'test'
        env: { GH_TOKEN: "${{ github.token }}" }
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- reports editions platform.json; then echo "Batch produced no repository changes."; exit 0; fi
          branch="batch/deep-cuts-$(date -u +%Y%m%d-%H%M%S)"
          git switch -c "$branch"
          git config user.name "deep-cuts-factory"
          git config user.email "deep-cuts-factory@users.noreply.github.com"
          git add reports editions platform.json
          git commit -m "Publish unattended Deep Cuts artist batch"
          git push -u origin "$branch"
          url="$(gh pr create --base main --head "$branch" --title "Publish unattended Deep Cuts artist batch" --body "Automated output. Configured artists passed the permanent 98% evidence gate; rejected artists are recorded in reports/REJECTED_ARTISTS.csv.")"
          gh pr merge "$url" --auto --squash || gh pr merge "$url" --admin --squash
      - name: Upload complete batch record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deep-cuts-batch-reports
          path: reports/**
          if-no-files-found: error
          retention-days: 90
