name: Deploy Deep Cuts

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deep-cuts-production
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/deep-cuts-ci.yml

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect newly published editions
        id: new_editions
        run: node scripts/detect-new-editions.mjs
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Generate scan-tested delivery artwork
        shell: bash
        run: |
          python -m pip install --disable-pip-version-check -r requirements.txt
          node -e "const p=require('./platform.json'); for(const e of p.editions.filter(e=>e.active)) console.log(e.slug)" |
          while read slug; do
            node scripts/build-edition.mjs "$slug"
          done
      - run: npm run build
      - name: Apply analytics database migrations
        run: npx --yes wrangler@4 d1 migrations apply deep-cuts-production --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy permanent Deep Cuts platform
        id: deploy
        shell: bash
        run: |
          set -o pipefail
          npx --yes wrangler@4 deploy 2>&1 | tee deploy.log
          platform_url="$(grep -Eo 'https://[^[:space:]]+workers\.dev' deploy.log | tail -1)"
          test -n "$platform_url"
          echo "url=$platform_url" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Install private platform runtime secrets
        shell: bash
        run: |
          set -euo pipefail
          put_required_secret() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error::Required Deep Cuts secret $name is not configured."
              exit 1
            fi
            printf '%s' "$value" | npx --yes wrangler@4 secret put "$name"
          }
          put_optional_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              printf '%s' "$value" | npx --yes wrangler@4 secret put "$name"
            fi
          }
          put_required_secret ADMIN_TOKEN "$DEEP_CUTS_ADMIN_TOKEN"
          put_required_secret RESEND_API_KEY "$RESEND_API_KEY"
          put_required_secret REPORT_RECIPIENT "$REPORT_RECIPIENT"
          put_required_secret REPORT_FROM_EMAIL "$REPORT_FROM_EMAIL"
          put_optional_secret RESEND_WEBHOOK_SECRET "$RESEND_WEBHOOK_SECRET"
          put_optional_secret RACING_DATA_API_URL "$RACING_DATA_API_URL"
          put_optional_secret RACING_DATA_API_KEY "$RACING_DATA_API_KEY"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEEP_CUTS_ADMIN_TOKEN: ${{ secrets.DEEP_CUTS_ADMIN_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_RECIPIENT: ${{ secrets.REPORT_RECIPIENT }}
          REPORT_FROM_EMAIL: ${{ secrets.REPORT_FROM_EMAIL }}
          RESEND_WEBHOOK_SECRET: ${{ secrets.RESEND_WEBHOOK_SECRET }}
          RACING_DATA_API_URL: ${{ secrets.RACING_DATA_API_URL }}
          RACING_DATA_API_KEY: ${{ secrets.RACING_DATA_API_KEY }}
      - name: Synchronise edition registry
        run: node scripts/sync-editions.mjs
        env:
          DEEP_CUTS_API_URL: ${{ steps.deploy.outputs.url }}
          DEEP_CUTS_ADMIN_TOKEN: ${{ secrets.DEEP_CUTS_ADMIN_TOKEN }}
      - name: Verify live service
        run: node scripts/smoke-live.mjs
        env:
          DEEP_CUTS_BASE_URL: ${{ steps.deploy.outputs.url }}
      - name: Verify deployed QR artwork
        run: node scripts/verify-deployed-qr.mjs
        env:
          DEEP_CUTS_BASE_URL: ${{ steps.deploy.outputs.url }}
      - name: Deliver newly published editions
        if: steps.new_editions.outputs.slugs != ''
        shell: bash
        run: |
          for slug in ${{ steps.new_editions.outputs.slugs }}; do
            node scripts/send-delivery.mjs "$slug"
          done
        env:
          DEEP_CUTS_API_URL: ${{ steps.deploy.outputs.url }}
          DEEP_CUTS_ADMIN_TOKEN: ${{ secrets.DEEP_CUTS_ADMIN_TOKEN }}

